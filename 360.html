    <!-- CSS Pannellum -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        /* Ukuran container panorama harus didefinisikan */
        #panorama {
            width: 100%;
            height: 500px; /* Atau sesuai kebutuhan */
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="container mx-auto p-5">
        <!-- Container untuk 360 -->
        <div id="panorama"></div>

    </div>

    <!-- JS Pannellum -->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
    <script>
        // Konfigurasi Pannellum
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "https://pannellum.org/images/alma.jpg", // Ganti URL gambar 360 kamu
            "autoLoad": true,
            "showControls": true
        });
    </script>

</body>
